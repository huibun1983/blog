{{ define "title" }}标签 - {{ .Site.Title }}{{ end }}
{{ define "main" }}
<main style="padding: 3rem 0;">
  <div class="container">
    <h1 style="font-size: 2rem; margin-bottom: 2rem;">标签列表</h1>
    
    <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
      {{ range $name, $taxonomy := .Site.Taxonomies.tags }}
      <a href="{{ "/tags/" | absURL }}{{ $name | urlize }}" 
         style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; background: var(--bg-secondary); border-radius: 8px; text-decoration: none; transition: all 0.2s;">
        <span style="color: var(--text-primary); font-weight: 600;">{{ $name }}</span>
        <span style="color: var(--text-secondary); font-size: 0.875rem;">({{ len $taxonomy }})</span>
      </a>
      {{ end }}
    </div>
  </div>
</main>
{{ end }}
